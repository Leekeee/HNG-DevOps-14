user  nginx;
worker_processes  auto;

events {
    worker_connections  1024;
}

http {
    set_real_ip_from  0.0.0.0/0;
    real_ip_header    X-Forwarded-For;

    log_format json_logs escape=json
        '{'
            '"source_ip":"$remote_addr",'
            '"timestamp":"$time_iso8601",'
            '"method":"$request_method",'
            '"path":"$request_uri",'
            '"status":$status,'
            '"response_size":$body_bytes_sent,'
            '"http_host":"$http_host",'
            '"user_agent":"$http_user_agent"'
        '}';

    access_log /var/log/nginx/hng-access.log json_logs;

    # ── Block 1: HTTP → HTTPS redirect for the subdomain ──────────
    # Any HTTP request to gbemihng14.duckdns.org gets bumped to HTTPS.
    # The Certbot challenge path is exempted so renewals still work.
    server {
        listen 80;
        server_name gbemihng14.duckdns.org;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── Block 2: HTTPS — dashboard + Nextcloud ────────────────────
    # This is the main server block, moved to 443 with SSL.
    # Everything that was in port 80 block lives here.
    server {
        listen 443 ssl;
        server_name gbemihng14.duckdns.org;

        ssl_certificate     /etc/letsencrypt/live/gbemihng14.duckdns.org/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/gbemihng14.duckdns.org/privkey.pem;

        # Recommended SSL settings
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # ── Dashboard ─────────────────────────────────────────────
        # Added the missing X-Forwarded-For and proto headers,
        # and proxy_buffering off so the 3-second refresh works cleanly.
        location /dashboard/ {
            proxy_pass         http://172.17.0.1:8000/;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_buffering    off;
        }

        # ── Nextcloud ─────────────────────────────────────────────
        # Unchanged from your original — just moved into this block.
        location / {
            proxy_pass         http://nextcloud;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }
}
